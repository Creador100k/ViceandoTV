<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamGrid — Free Live TV</title>
  <meta name="description" content="Browse thousands of free live TV channels worldwide. No subscription. No login." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;500;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- HLS.js for stream playback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --bg2:       #0d1117;
      --bg3:       #131920;
      --surface:   #161d26;
      --surface2:  #1c2532;
      --border:    #1e2d3d;
      --border2:   #243040;
      --accent:    #e8f04a;       /* electric yellow-green */
      --accent2:   #00d4ff;       /* cyan */
      --accent3:   #ff4757;       /* signal red */
      --text:      #e2e8f0;
      --text2:     #8899aa;
      --text3:     #4a5568;
      --live:      #ff4757;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'Barlow', sans-serif;
      --radius:    4px;
      --radius-lg: 8px;
      --transition: 180ms ease;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,12,16,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 56px;
    }

    .logo {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--accent);
      white-space: nowrap;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo svg { width: 20px; height: 20px; }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent3);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* Search */
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 12px 8px 36px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    #search::placeholder { color: var(--text3); }
    #search:focus { border-color: var(--accent); background: var(--bg3); }

    /* Header stats */
    .header-stats {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .stat-val { color: var(--accent2); font-weight: 700; }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    aside {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-section { display: flex; flex-direction: column; }

    .sidebar-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 16px;
      background: none;
      border: none;
      color: var(--text2);
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background var(--transition), color var(--transition);
      width: 100%;
    }

    .filter-btn:hover { background: var(--surface); color: var(--text); }

    .filter-btn.active {
      background: var(--surface2);
      color: var(--accent);
      border-right: 2px solid var(--accent);
    }

    .filter-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      flex-shrink: 0;
    }

    .filter-btn.active .filter-count { color: var(--accent); opacity: 0.7; }

    /* Country flags as emoji */
    .flag { font-size: 15px; flex-shrink: 0; }

    /* Category icon */
    .cat-icon { font-size: 13px; }

    /* ── Main content ────────────────────────────────────────────────────── */
    main { overflow: hidden; display: flex; flex-direction: column; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex: 1;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 3px;
    }

    .view-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 3px;
      transition: all var(--transition);
      display: flex;
      align-items: center;
    }

    .view-btn.active { background: var(--surface2); color: var(--accent); }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }

    .filter-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--accent2);
    }

    .pill-close {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }

    /* ── Channel Grid ────────────────────────────────────────────────────── */
    #channel-grid {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .list-view { display: flex; flex-direction: column; gap: 2px; }

    /* Grid card */
    .channel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative;
    }

    .channel-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .channel-card.has-stream:hover { border-color: var(--accent); }

    .card-logo-wrap {
      aspect-ratio: 16/9;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-logo {
      max-width: 80%;
      max-height: 70%;
      object-fit: contain;
      filter: brightness(0.9);
    }

    .card-logo-fallback {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 900;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stream-badge {
      position: absolute;
      top: 6px; right: 6px;
      background: var(--live);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 2px;
    }

    .card-body { padding: 10px 12px; }

    .card-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 11px;
      color: var(--text3);
    }

    .card-cats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text3);
      padding: 1px 6px;
      text-transform: lowercase;
    }

    /* List row */
    .channel-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }

    .channel-row:hover { background: var(--surface2); border-color: var(--border2); }
    .channel-row.has-stream:hover { border-color: var(--accent); }

    .row-logo {
      width: 48px; height: 30px;
      object-fit: contain;
      background: var(--bg3);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .row-logo-fallback {
      width: 48px; height: 30px;
      background: var(--bg3);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      flex-shrink: 0;
    }

    .row-name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-country { font-size: 12px; color: var(--text3); flex-shrink: 0; }
    .row-cats { display: flex; gap: 4px; flex-shrink: 0; }

    /* Empty / loading states */
    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 300px;
      color: var(--text3);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .state-msg .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .page-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }
    .page-btn:disabled { opacity: 0.3; cursor: default; }

    .page-info {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
    }

    /* ── Player Modal ────────────────────────────────────────────────────── */
    #player-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(4,8,12,0.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    #player-overlay.open { display: flex; }

    .player-modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: min(900px, 96vw);
      max-height: 92vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 80px rgba(0,0,0,0.7);
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .player-logo {
      width: 52px; height: 32px;
      object-fit: contain;
      background: var(--bg3);
      border-radius: 3px;
    }

    .player-channel-name {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .player-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      cursor: pointer;
      font-size: 18px;
      padding: 4px 10px;
      transition: all var(--transition);
    }

    .player-close:hover { border-color: var(--accent3); color: var(--accent3); }

    .player-body { flex: 1; overflow-y: auto; }

    /* Video area */
    .video-wrap {
      background: #000;
      position: relative;
      aspect-ratio: 16/9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text3);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .video-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }

    /* Stream picker */
    .stream-section { padding: 16px 18px; }

    .stream-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .stream-list { display: flex; flex-direction: column; gap: 6px; }

    .stream-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .stream-item:hover { border-color: var(--accent); background: var(--bg3); }
    .stream-item.playing { border-color: var(--accent); background: rgba(232,240,74,0.05); }

    .stream-url { flex: 1; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stream-status { font-size: 10px; padding: 2px 8px; border-radius: 2px; }
    .stream-status.online  { background: rgba(0,212,255,0.1); color: var(--accent2); }
    .stream-status.unknown { background: rgba(255,255,255,0.05); color: var(--text3); }
    .stream-status.error   { background: rgba(255,71,87,0.1); color: var(--accent3); }

    .play-icon { flex-shrink: 0; color: var(--text3); }
    .stream-item:hover .play-icon { color: var(--accent); }
    .stream-item.playing .play-icon { color: var(--accent); }

    /* Channel info */
    .channel-info { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 20px; flex-wrap: wrap; }

    .info-item { display: flex; flex-direction: column; gap: 3px; }
    .info-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
    .info-val { font-size: 13px; color: var(--text); }

    /* No stream msg */
    .no-stream-msg {
      padding: 24px 18px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text3);
      text-align: center;
    }

    .copy-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 10px;
      transition: all var(--transition);
    }

    .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 300;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .build-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .build-bar a { color: var(--text3); text-decoration: none; }
    .build-bar a:hover { color: var(--accent2); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }

      aside {
        position: static;
        height: auto;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: visible;
        padding: 8px 12px;
        gap: 12px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-section { flex-direction: row; align-items: center; flex-shrink: 0; gap: 4px; }
      .sidebar-label { display: none; }
      .filter-btn { white-space: nowrap; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; }
      .filter-btn.active { border-right-width: 1px; border-radius: 20px; }
      .filter-count { display: none; }

      .header-stats { display: none; }
      .grid-view { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    }

    /* ── Animations ──────────────────────────────────────────────────────── */
    .channel-card, .channel-row {
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .channel-card:nth-child(1)  { animation-delay: 0.02s; }
    .channel-card:nth-child(2)  { animation-delay: 0.04s; }
    .channel-card:nth-child(3)  { animation-delay: 0.06s; }
    .channel-card:nth-child(4)  { animation-delay: 0.08s; }
    .channel-card:nth-child(5)  { animation-delay: 0.10s; }
    .channel-card:nth-child(6)  { animation-delay: 0.12s; }
    .channel-card:nth-child(n+7){ animation-delay: 0.14s; }
  </style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    StreamGrid
  </div>

  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Search channels..." autocomplete="off" />
  </div>

  <div class="header-stats" id="header-stats">
    Loading…
  </div>
</header>

<!-- ══════════════ LAYOUT ══════════════ -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Filter</div>
      <button class="filter-btn active" data-filter="all" data-type="special">
        <span>All Channels</span>
        <span class="filter-count" id="count-all">—</span>
      </button>
      <button class="filter-btn" data-filter="streams" data-type="special">
        <span>🔴 With Stream</span>
        <span class="filter-count" id="count-streams">—</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Category</div>
      <div id="cat-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Country</div>
      <div id="country-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <div class="toolbar-title" id="toolbar-title">All Channels</div>

      <div id="active-filter-pill" style="display:none" class="filter-pill">
        <span id="active-filter-label"></span>
        <button class="pill-close" id="clear-filter">✕</button>
      </div>

      <select class="sort-select" id="sort-select">
        <option value="stream">Streams first</option>
        <option value="alpha">A → Z</option>
        <option value="country">By country</option>
      </select>

      <div class="view-toggle">
        <button class="view-btn active" id="view-grid" title="Grid">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="view-btn" id="view-list" title="List">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="channel-grid" class="grid-view">
      <div class="state-msg"><div class="spinner"></div><span>Loading channels…</span></div>
    </div>

    <div class="pagination" id="pagination" style="display:none"></div>

    <div class="build-bar" id="build-bar" style="display:none"></div>
  </main>
</div>

<!-- ══════════════ PLAYER MODAL ══════════════ -->
<div id="player-overlay">
  <div class="player-modal">
    <div class="player-header">
      <img class="player-logo" id="player-logo" src="" alt="" />
      <div>

        <div style="font-size:11px;color:var(--text3);font-family:var(--font-mono)" id="player-country"></div>

      <!-- Video -->
      <div class="video-wrap" id="video-wrap">
        <video id="video-player" controls playsinline></video>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <span>Select a stream below to play</span>
        </div>

      <!-- Streams -->

<!-- ══════════════ TOAST ══════════════ -->
<div id="toast"></div>

<!-- ══════════════ APP SCRIPT ══════════════ -->
<script>
(function () {
  'use strict';

  /* ── Config ─────────────────────────────────────────────────── */
  const API_BASE   = 'https://iptv-org.github.io/api';
  const CACHE_BASE = './cache';          // GitHub Actions writes here
  const PAGE_SIZE  = 60;
  const COUNTRY_FLAGS = {};              // populated from countries API

  /* ── State ──────────────────────────────────────────────────── */
  const state = {
    channels:    [],      // full enriched channel list
    slim:        [],      // slim list for sidebar counts
    countries:   [],
    categories:  [],
    filtered:    [],
    page:        1,
    view:        'grid',  // 'grid' | 'list'
    sort:        'stream',
    filter:      { type: 'special', value: 'all' },
    search:      '',
    meta:        null,
  };

  /* ── DOM refs ───────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const el = {
    grid:         $('channel-grid'),
    pagination:   $('pagination'),
    search:       $('search'),
    catList:      $('cat-list'),
    countryList:  $('country-list'),
    toolbar:      $('toolbar-title'),
    sortSelect:   $('sort-select'),
    statsHeader:  $('header-stats'),
    buildBar:     $('build-bar'),
    viewGrid:     $('view-grid'),
    viewList:     $('view-list'),
    filterPill:   $('active-filter-pill'),
    filterLabel:  $('active-filter-label'),
    clearFilter:  $('clear-filter'),
    countAll:     $('count-all'),
    countStreams:  $('count-streams'),
    // player
    overlay:      $('player-overlay'),
    playerLogo:   $('player-logo'),
    playerName:   $('player-name'),
    playerCountry:$('player-country'),
    playerClose:  $('player-close'),
    videoWrap:    $('video-wrap'),
    videoPlayer:  $('video-player'),
    videoPlaceholder: $('video-placeholder'),
    streamSection:$('stream-section'),
    channelInfo:  $('channel-info'),
  };

  let hls = null;
  let currentChannelDetail = null;   // full detail fetched on click

  /* ── Utility ─────────────────────────────────────────────────── */
  function countryFlag(cc) {
    if (!cc || cc.length !== 2) return '';
    return cc.toUpperCase().replace(/./g, c =>
      String.fromCodePoint(127397 + c.charCodeAt(0))
    );
  }

  function initials(name) {
    return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  function toast(msg, dur = 2500) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  function fallbackLogo(name) {
    return `<div class="card-logo-fallback">${initials(name)}</div>`;
  }

  /* ── Data fetching ───────────────────────────────────────────── */
  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status} for ${url}`);
    return r.json();
  }

  async function loadData() {
    // Try cached version first (GitHub Actions), fallback to live API
    const sources = [
      { slim: `${CACHE_BASE}/channels_slim.json`,   full: `${CACHE_BASE}/channels.json`,   countries: `${CACHE_BASE}/countries.json`,   cats: `${CACHE_BASE}/categories.json`,   meta: `${CACHE_BASE}/meta.json` },
      { slim: `${API_BASE}/channels.json`,          full: `${API_BASE}/channels.json`,     countries: `${API_BASE}/countries.json`,     cats: `${API_BASE}/categories.json`,     meta: null },
    ];

    let slim, channels, countries, cats, meta;

    for (const src of sources) {
      try {
        [slim, countries, cats] = await Promise.all([
          fetchJSON(src.slim),
          fetchJSON(src.countries),
          fetchJSON(src.cats),
        ]);
        channels = slim; // slim IS the full list from live API; from cache it's the slim version
        if (src.meta) {
          try { meta = await fetchJSON(src.meta); } catch(_) {}
        }
        break;
      } catch(e) {
        console.warn('Source failed, trying next…', e);
      }
    }

    if (!slim) throw new Error('All data sources failed.');

    // Build country map
    countries.forEach(c => {
      COUNTRY_FLAGS[c.code] = { name: c.name, flag: countryFlag(c.code) };
    });

    state.slim       = slim.filter(c => !c.is_nsfw && !c.closed);
    state.channels   = state.slim;
    state.countries  = countries.filter(c =>
      slim.some(ch => ch.country === c.code)
    ).sort((a,b) => a.name.localeCompare(b.name));
    state.categories = cats.sort((a,b) => a.id.localeCompare(b.id));
    state.meta       = meta;

    return { slim, countries, cats };
  }

  /* ── Sidebar ─────────────────────────────────────────────────── */
  const CAT_ICONS = {
    news: '📺', sports: '⚽', movies: '🎬', entertainment: '🎭',
    music: '🎵', kids: '👶', documentary: '🎥', cooking: '🍳',
    travel: '✈️', auto: '🚗', business: '💼', religious: '✝️',
    classic: '📼', general: '📡', series: '🎞️', culture: '🎨',
    comedy: '😂', animation: '🐭', lifestyle: '🌿', shop: '🛍️',
    weather: '🌦️', science: '🔬', adult: '🔞',
  };

  function buildSidebar() {
    const catCounts = {};
    const countryCounts = {};
    state.channels.forEach(ch => {
      (ch.categories || []).forEach(c => { catCounts[c] = (catCounts[c] || 0) + 1; });
      if (ch.country) countryCounts[ch.country] = (countryCounts[ch.country] || 0) + 1;
    });

    const streamCount = state.channels.filter(c => c.has_stream).length;
    el.countAll.textContent    = state.channels.length.toLocaleString();
    el.countStreams.textContent = streamCount.toLocaleString();

    // Categories
    el.catList.innerHTML = state.categories
      .filter(c => catCounts[c.id])
      .map(c => `
        <button class="filter-btn" data-filter="${c.id}" data-type="category">
          <span><span class="cat-icon">${CAT_ICONS[c.id] || '📺'}</span> ${c.name}</span>
          <span class="filter-count">${catCounts[c.id] || 0}</span>
        </button>
      `).join('');

    // Top 30 countries by count
    const topCountries = Object.entries(countryCounts)
      .sort((a,b) => b[1]-a[1]).slice(0, 30);

    el.countryList.innerHTML = topCountries.map(([cc, count]) => {
      const info = COUNTRY_FLAGS[cc] || { name: cc, flag: '' };
      return `
        <button class="filter-btn" data-filter="${cc}" data-type="country">
          <span><span class="flag">${info.flag}</span> ${info.name}</span>
          <span class="filter-count">${count}</span>
        </button>
      `;
    }).join('');

    // Attach sidebar click events
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.filter = { type: btn.dataset.type, value: btn.dataset.filter };
        state.page = 1;
        state.search = '';
        el.search.value = '';
        applyFilters();
      });
    });
  }

  /* ── Filtering & sorting ─────────────────────────────────────── */
  function applyFilters() {
    let result = [...state.channels];
    const { type, value } = state.filter;
    const q = state.search.trim().toLowerCase();

    // Filter by type
    if (type === 'special' && value === 'streams') {
      result = result.filter(c => c.has_stream);
    } else if (type === 'category') {
      result = result.filter(c => c.categories && c.categories.includes(value));
    } else if (type === 'country') {
      result = result.filter(c => c.country === value);
    }

    // Search
    if (q) {
      result = result.filter(c =>
        c.name.toLowerCase().includes(q) ||
        (c.alt_names || []).some(n => n.toLowerCase().includes(q)) ||
        (c.country || '').toLowerCase().includes(q)
      );
    }

    // Sort
    if (state.sort === 'stream') {
      result.sort((a,b) => (b.has_stream ? 1 : 0) - (a.has_stream ? 1 : 0) || a.name.localeCompare(b.name));
    } else if (state.sort === 'alpha') {
      result.sort((a,b) => a.name.localeCompare(b.name));
    } else if (state.sort === 'country') {
      result.sort((a,b) => (a.country||'').localeCompare(b.country||'') || a.name.localeCompare(b.name));
    }

    state.filtered = result;

    // Update toolbar + pill
    let title = 'All Channels';
    if (type === 'special' && value === 'streams') title = '🔴 Live Streams';
    else if (type === 'category') {
      const cat = state.categories.find(c => c.id === value);
      title = cat ? cat.name : value;
      showFilterPill(title);
    } else if (type === 'country') {
      const info = COUNTRY_FLAGS[value] || { name: value, flag: '' };
      title = `${info.flag} ${info.name}`;
      showFilterPill(title);
    }

    if (type === 'special') el.filterPill.style.display = 'none';
    el.toolbar.textContent = q ? `Results for "${state.search}"` : title;

    renderPage();
    renderPagination();
  }

  function showFilterPill(label) {
    el.filterLabel.textContent = label;
    el.filterPill.style.display = 'flex';
  }

  el.clearFilter.addEventListener('click', () => {
    state.filter = { type: 'special', value: 'all' };
    state.search = '';
    el.search.value = '';
    el.filterPill.style.display = 'none';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="all"]').classList.add('active');
    state.page = 1;
    applyFilters();
  });

  /* ── Rendering ───────────────────────────────────────────────── */
  function renderPage() {
    const start  = (state.page - 1) * PAGE_SIZE;
    const slice  = state.filtered.slice(start, start + PAGE_SIZE);

    if (slice.length === 0) {
      el.grid.innerHTML = `<div class="state-msg"><span>No channels found.</span></div>`;
      return;
    }

    if (state.view === 'grid') {
      el.grid.className = 'grid-view';
      el.grid.innerHTML = slice.map(ch => renderCardHTML(ch)).join('');
    } else {
      el.grid.className = 'list-view';
      el.grid.innerHTML = slice.map(ch => renderRowHTML(ch)).join('');
    }

    // Image fallback
    el.grid.querySelectorAll('img.card-logo, img.row-logo').forEach(img => {
      img.addEventListener('error', () => {
        const wrap = img.closest('.card-logo-wrap, .row-logo-wrap');
        if (wrap) {
          const name = img.dataset.name || '';
          img.replaceWith(Object.assign(document.createElement('div'), {
            className: img.className === 'card-logo' ? 'card-logo-fallback' : 'row-logo-fallback',
            textContent: initials(name),
          }));
        } else {
          img.style.visibility = 'hidden';
        }
      });
    });

    // Click handlers
    el.grid.querySelectorAll('[data-channel-id]').forEach(card => {
      card.addEventListener('click', () => openPlayer(card.dataset.channelId));
    });
  }

  function renderCardHTML(ch) {
    const flag   = COUNTRY_FLAGS[ch.country]?.flag || '';
    const cats   = (ch.categories || []).slice(0,2).map(c => `<span class="tag">${c}</span>`).join('');
    const stream = ch.has_stream ? '<span class="stream-badge">LIVE</span>' : '';
    return `
      <div class="channel-card ${ch.has_stream ? 'has-stream' : ''}" data-channel-id="${ch.id}">
        <div class="card-logo-wrap">
          <img class="card-logo" src="${ch.logo}" alt="${ch.name}" data-name="${ch.name}"
               loading="lazy" decoding="async" />
          ${stream}
        </div>
        <div class="card-body">
          <div class="card-name" title="${ch.name}">${ch.name}</div>
          <div class="card-meta">
            <span class="flag">${flag}</span>
            <span>${ch.country || '—'}</span>
          </div>
          <div class="card-cats">${cats}</div>
        </div>
      </div>
    `;
  }

  function renderRowHTML(ch) {
    const flag = COUNTRY_FLAGS[ch.country]?.flag || '';
    const cats = (ch.categories || []).slice(0,3).map(c => `<span class="tag">${c}</span>`).join('');
    const streamDot = ch.has_stream ? '🔴 ' : '';
    return `
      <div class="channel-row ${ch.has_stream ? 'has-stream' : ''}" data-channel-id="${ch.id}">
        <img class="row-logo" src="${ch.logo}" alt="${ch.name}" data-name="${ch.name}" loading="lazy" decoding="async" />
        <div class="row-name">${streamDot}${ch.name}</div>
        <div class="row-country"><span class="flag">${flag}</span> ${ch.country || '—'}</div>
        <div class="row-cats">${cats}</div>
      </div>
    `;
  }

  /* ── Pagination ──────────────────────────────────────────────── */
  function renderPagination() {
    const total = Math.ceil(state.filtered.length / PAGE_SIZE);
    if (total <= 1) { el.pagination.style.display = 'none'; return; }

    el.pagination.style.display = 'flex';

    const p = state.page;
    let pages = [];

    // Prev
    pages.push(`<button class="page-btn" ${p===1?'disabled':''} data-page="${p-1}">← Prev</button>`);

    // First
    if (p > 3) pages.push(`<button class="page-btn" data-page="1">1</button>`);
    if (p > 4) pages.push(`<span class="page-info">…</span>`);

    // Neighbourhood
    for (let i = Math.max(1,p-2); i <= Math.min(total,p+2); i++) {
      pages.push(`<button class="page-btn ${i===p?'active':''}" data-page="${i}">${i}</button>`);
    }

    // Last
    if (p < total-3) pages.push(`<span class="page-info">…</span>`);
    if (p < total-2) pages.push(`<button class="page-btn" data-page="${total}">${total}</button>`);

    // Next
    pages.push(`<button class="page-btn" ${p===total?'disabled':''} data-page="${p+1}">Next →</button>`);

    // Info
    const start = (p-1)*PAGE_SIZE+1;
    const end   = Math.min(p*PAGE_SIZE, state.filtered.length);
    pages.push(`<span class="page-info">${start}–${end} of ${state.filtered.length}</span>`);

    el.pagination.innerHTML = pages.join('');
    el.pagination.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.page = parseInt(btn.dataset.page);
        renderPage();
        renderPagination();
        el.grid.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  /* ── Player ──────────────────────────────────────────────────── */
  async function openPlayer(channelId) {
    const slim = state.channels.find(c => c.id === channelId);
    if (!slim) return;

    // Show modal immediately with slim data
    el.overlay.classList.add('open');
    el.playerName.textContent    = slim.name;
    el.playerLogo.src            = slim.logo;
    el.playerLogo.alt            = slim.name;
    el.playerCountry.textContent = (COUNTRY_FLAGS[slim.country]?.flag || '') + ' ' + (slim.country || '');
    el.streamSection.innerHTML   = '<div style="padding:16px 18px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">Loading stream info…</div>';
    el.channelInfo.innerHTML     = '';
    resetVideo();

    // Fetch full channel detail from the detail endpoint
    try {
      // Try cache first, then live API
      let detail;
      try {
        const allChannels = await fetchJSON(`${CACHE_BASE}/channels.json`);
        detail = allChannels.find(c => c.id === channelId);
      } catch(_) {}

      if (!detail) {
        // Live streams API as fallback
        const streams = await fetchJSON(`${API_BASE}/streams.json`);
        const chStreams = streams.filter(s => s.channel === channelId && !s.is_nsfw);
        detail = { ...slim, streams: chStreams.map(s => ({ url: s.url, status: s.status || 'unknown', http_referrer: s.http_referrer, user_agent: s.user_agent })) };
      }

      currentChannelDetail = detail;
      renderPlayerContent(detail);
    } catch(e) {
      console.error(e);
      el.streamSection.innerHTML = `<div class="no-stream-msg">Could not load stream data.</div>`;
    }
  }

  function renderPlayerContent(detail) {
    const streams = detail.streams || [];

    if (streams.length === 0) {
      el.streamSection.innerHTML = `
        <div class="no-stream-msg">
          No streams found for this channel.<br/>
          <a href="${detail.website || '#'}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none">
            Visit official website →
          </a>
        </div>`;
    } else {
      el.streamSection.innerHTML = `
        <div class="stream-section-title">Available Streams (${streams.length})</div>
        <div class="stream-list">
          ${streams.map((s, i) => `
            <div class="stream-item" data-idx="${i}">
              <span class="play-icon">▶</span>
              <span class="stream-url" title="${s.url}">${s.url}</span>
              <span class="stream-status ${s.status || 'unknown'}">${s.status || 'unknown'}</span>
              <button class="copy-btn" data-url="${s.url}">copy</button>
            </div>
          `).join('')}
        </div>
      `;

      // Play on stream-item click
      el.streamSection.querySelectorAll('.stream-item').forEach(item => {
        item.addEventListener('click', e => {
          if (e.target.classList.contains('copy-btn')) return;
          const idx = parseInt(item.dataset.idx);
          el.streamSection.querySelectorAll('.stream-item').forEach(i => i.classList.remove('playing'));
          item.classList.add('playing');
          playStream(streams[idx]);
        });
      });

      // Copy buttons
      el.streamSection.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          navigator.clipboard.writeText(btn.dataset.url).then(() => toast('URL copied!'));
        });
      });

      // Auto-play first stream
      el.streamSection.querySelector('.stream-item')?.click();
    }

    // Channel info
    const infoFields = [
      { label: 'Channel ID', val: detail.id },
      { label: 'Country',    val: (COUNTRY_FLAGS[detail.country]?.flag||'') + ' ' + (COUNTRY_FLAGS[detail.country]?.name || detail.country) },
      { label: 'Network',    val: detail.network || '—' },
      { label: 'Categories', val: (detail.categories||[]).join(', ') || '—' },
    ];

    if (detail.website) {
      infoFields.push({ label: 'Website', val: `<a href="${detail.website}" target="_blank" rel="noopener" style="color:var(--accent2)">${detail.website.replace('https://','')}</a>` });
    }

    el.channelInfo.innerHTML = infoFields.map(f => `
      <div class="info-item">
        <span class="info-label">${f.label}</span>
        <span class="info-val">${f.val}</span>
      </div>
    `).join('');
  }

  function playStream(stream) {
    resetVideo();
    const video = el.videoPlayer;
    el.videoPlaceholder.style.display = 'none';
    video.style.display = 'block';

    if (Hls.isSupported() && stream.url.includes('.m3u8')) {
      hls = new Hls({
        xhrSetup(xhr) {
          if (stream.http_referrer) xhr.setRequestHeader('Referer', stream.http_referrer);
        }
      });
      hls.loadSource(stream.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) toast('Stream error. Try another source.');
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = stream.url;
      video.play().catch(()=>{});
    } else {
      video.src = stream.url;
      video.play().catch(()=>{});
    }
  }

  function resetVideo() {
    if (hls) { hls.destroy(); hls = null; }
    const video = el.videoPlayer;
    video.pause();
    video.src = '';
    video.style.display = 'none';
    el.videoPlaceholder.style.display = 'flex';
  }

  el.playerClose.addEventListener('click', () => {
    el.overlay.classList.remove('open');
    resetVideo();
  });

  el.overlay.addEventListener('click', e => {
    if (e.target === el.overlay) {
      el.overlay.classList.remove('open');
      resetVideo();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && el.overlay.classList.contains('open')) {
      el.overlay.classList.remove('open');
      resetVideo();
    }
  });

  /* ── Search ──────────────────────────────────────────────────── */
  let searchDebounce;
  el.search.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      state.search = el.search.value;
      state.page   = 1;
      applyFilters();
    }, 250);
  });

  /* ── Sort ────────────────────────────────────────────────────── */
  el.sortSelect.addEventListener('change', () => {
    state.sort = el.sortSelect.value;
    state.page = 1;
    applyFilters();
  });

  /* ── View toggle ─────────────────────────────────────────────── */
  el.viewGrid.addEventListener('click', () => {
    state.view = 'grid';
    el.viewGrid.classList.add('active');
    el.viewList.classList.remove('active');
    renderPage();
  });

  el.viewList.addEventListener('click', () => {
    state.view = 'list';
    el.viewList.classList.add('active');
    el.viewGrid.classList.remove('active');
    renderPage();
  });

  /* ── Build bar ───────────────────────────────────────────────── */
  function renderBuildBar() {
    const { meta } = state;
    if (!meta) return;
    const d = new Date(meta.built_at);
    const label = isNaN(d.getTime()) ? meta.built_at : d.toLocaleString();
    el.buildBar.style.display = 'flex';
    el.buildBar.innerHTML = `
      <span>Data: <a href="https://github.com/iptv-org/api" target="_blank" rel="noopener">iptv-org/api</a></span>
      <span>Cache built: ${label} · ${meta.channels?.toLocaleString()||'?'} channels · ${meta.streams?.toLocaleString()||'?'} streams</span>
    `;
  }

  /* ── Boot ────────────────────────────────────────────────────── */
  async function boot() {
    try {
      await loadData();
      buildSidebar();
      applyFilters();

      const total   = state.channels.length;
      const streams = state.channels.filter(c => c.has_stream).length;
      el.statsHeader.innerHTML = `
        <span class="stat-val">${total.toLocaleString()}</span> channels · 
        <span class="stat-val">${streams.toLocaleString()}</span> streams
      `;

      renderBuildBar();
    } catch(e) {
      console.error(e);
      el.grid.innerHTML = `
        <div class="state-msg">
          <span style="color:var(--accent3)">⚠ Failed to load data.</span>
          <span>${e.message}</span>
        </div>
      `;
    }
  }

  boot();

})();
</script>

</body>
</html>
