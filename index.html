<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MUNDIAL — VICIOTV</title>
<meta name="description" content="Explorá miles de canales de TV en vivo de todo el mundo. Sin suscripción. Sin login.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#08080c}

/* ─── TOKENS ─── */
:root{
  --ink:     #08080c;
  --ink2:    #0f0f15;
  --ink3:    #16161f;
  --ink4:    #1e1e2a;
  --g:       rgba(255,255,255,0.04);
  --g2:      rgba(255,255,255,0.07);
  --g3:      rgba(255,255,255,0.11);
  --rim:     rgba(255,255,255,0.07);
  --rim2:    rgba(255,255,255,0.13);
  --rim3:    rgba(255,255,255,0.20);
  --snow:    #f0ede8;
  --snow2:   #b8b5ae;
  --snow3:   #6e6c66;
  --fire:    #ff5e3a;
  --fire2:   #ff8555;
  --fire3:   #ffb088;
  --ember:   rgba(255,94,58,0.12);
  --ember2:  rgba(255,94,58,0.20);
  --r:       14px;
  --r2:      22px;
  --r3:      32px;
  --ease:    cubic-bezier(0.25,0,0,1);
  --ease2:   cubic-bezier(0.34,1.56,0.64,1);
  --nav-h:   60px;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:1px}

/* ══════════════════════════════════════════════
   INTRO SCREEN
══════════════════════════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:9999;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  overflow:hidden;
  transition:opacity 0.7s var(--ease), transform 0.7s var(--ease);
}
#intro.exit{
  opacity:0;
  transform:scale(1.04);
  pointer-events:none;
}

/* Ambient orb */
#intro-orb{
  position:absolute;
  width:min(600px,100vw);
  height:min(600px,100vw);
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,94,58,0.18) 0%,rgba(255,94,58,0.06) 40%,transparent 70%);
  filter:blur(60px);
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  animation:orb-in 2s var(--ease) 0.3s forwards;
  pointer-events:none;
}
@keyframes orb-in{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  60%{opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

#intro-logo{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(36px,8vw,80px);
  letter-spacing:clamp(2px,1vw,8px);
  color:var(--snow);
  opacity:0;
  transform:translateY(16px);
  animation:fade-up 0.8s var(--ease) 0.8s forwards;
  display:flex;align-items:center;gap:12px;
  user-select:none;
}
.intro-tv{color:var(--snow3)}
.intro-sep{
  width:2px;height:clamp(28px,5vw,56px);
  background:linear-gradient(to bottom,transparent,var(--fire),transparent);
  opacity:0;
  animation:fade-in 0.4s ease 1.2s forwards;
  flex-shrink:0;
}
.intro-vicio{
  background:linear-gradient(135deg,var(--snow) 0%,var(--fire3) 60%,var(--fire2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

#intro-sub{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(11px,1.5vw,13px);
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--snow3);
  margin-top:16px;
  opacity:0;
  animation:fade-in 0.6s ease 1.3s forwards;
}

#intro-bar{
  margin-top:48px;
  width:120px;height:1px;
  background:var(--rim2);
  position:relative;
  opacity:0;
  animation:fade-in 0.4s ease 1.4s forwards;
  overflow:hidden;
}
#intro-bar::after{
  content:'';
  position:absolute;inset:0;
  background:var(--fire);
  transform:scaleX(0);
  transform-origin:left;
  animation:bar-fill 1.4s var(--ease) 1.5s forwards;
}
@keyframes bar-fill{to{transform:scaleX(1)}}

@keyframes fade-up{
  to{opacity:1;transform:translateY(0)}
}
@keyframes fade-in{to{opacity:1}}

/* ══════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:var(--ink);
  opacity:0;
  transition:opacity 0.6s var(--ease);
  pointer-events:none;
}
#app.visible{
  opacity:1;
  pointer-events:all;
}

/* Ambient bg */
#app-ambient{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 75% 25%,rgba(255,94,58,0.065) 0%,transparent 70%),
    radial-gradient(ellipse 45% 55% at 15% 75%,rgba(255,133,85,0.04) 0%,transparent 70%);
  animation:ambient-shift 18s ease-in-out infinite alternate;
}
@keyframes ambient-shift{
  0%{opacity:0.7;transform:scale(1) rotate(0deg)}
  100%{opacity:1;transform:scale(1.06) rotate(2deg)}
}

/* ─── HEADER ─── */
#header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;
  background:rgba(8,8,12,0.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--rim);
  flex-shrink:0;
  gap:16px;
}

/* Logo */
.logo-wrap{
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;user-select:none;
}
.logo-tv{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:3px;text-transform:uppercase;
  color:var(--snow3);
}
.logo-line{
  width:1px;height:16px;
  background:linear-gradient(to bottom,transparent,var(--rim3),transparent);
}
.logo-main{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:3px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--snow) 30%,var(--fire3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* Search */
#search-wrap{
  flex:1;max-width:420px;
  position:relative;
}
#search-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--snow3);pointer-events:none;flex-shrink:0;
}
#search-input{
  width:100%;
  background:var(--g);
  border:1px solid var(--rim);
  border-radius:100px;
  color:var(--snow);
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  padding:10px 18px 10px 42px;
  outline:none;
  transition:background 0.2s,border-color 0.2s,box-shadow 0.2s;
}
#search-input::placeholder{color:var(--snow3)}
#search-input:focus{
  background:var(--g2);
  border-color:rgba(255,94,58,0.35);
  box-shadow:0 0 0 3px rgba(255,94,58,0.07);
}

/* Header right */
#header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}

.live-badge{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;
  background:var(--ember);
  border:1px solid rgba(255,94,58,0.22);
  border-radius:100px;
  font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--fire2);
  flex-shrink:0;
}
.live-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--fire);
  animation:beat 1.6s ease-in-out infinite;
}
@keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.65)}}

.back-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;
  background:var(--g);
  border:1px solid var(--rim);
  border-radius:100px;
  font-family:'DM Sans',sans-serif;
  font-size:12px;color:var(--snow2);
  cursor:pointer;
  transition:all 0.2s var(--ease);
  white-space:nowrap;
  text-decoration:none;
}
.back-btn:hover{
  background:var(--g2);
  border-color:var(--rim2);
  color:var(--snow);
}
.back-arrow{font-size:13px;transition:transform 0.2s var(--ease)}
.back-btn:hover .back-arrow{transform:translateX(-2px)}

/* ─── MOOD BAR WRAPPER ─── */
#mood-bar-wrap{
  position:relative;z-index:9;
  flex-shrink:0;
  border-bottom:1px solid var(--rim);
  background:rgba(8,8,12,0.6);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

/* Arrow buttons */
.mood-arrow{
  position:absolute;top:0;bottom:0;z-index:2;
  width:40px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;background:none;
  font-size:14px;color:var(--snow2);
  transition:color 0.2s;
  padding:0;
}
.mood-arrow:hover{color:var(--snow)}
.mood-arrow.left{
  left:0;
  background:linear-gradient(to right,rgba(8,8,12,0.85) 40%,transparent);
}
.mood-arrow.right{
  right:0;
  background:linear-gradient(to left,rgba(8,8,12,0.85) 40%,transparent);
}
.mood-arrow.hidden{opacity:0;pointer-events:none}

/* ─── MOOD BAR ─── */
#mood-bar{
  position:relative;z-index:9;
  display:flex;gap:6px;
  padding:12px 24px;
  overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;
  cursor:grab;
}
#mood-bar:active{cursor:grabbing;}
#mood-bar::-webkit-scrollbar{display:none}

.mood-pill{
  display:flex;align-items:center;gap:6px;
  padding:7px 15px;
  background:var(--g);
  border:1px solid var(--rim);
  border-radius:100px;
  white-space:nowrap;cursor:pointer;
  transition:all 0.22s var(--ease);
  font-family:'DM Sans',sans-serif;
  font-size:12px;color:var(--snow2);
  flex-shrink:0;
  outline:none;
}
.mood-pill:hover{
  background:var(--g2);
  border-color:var(--rim2);
  color:var(--snow);
  transform:translateY(-1px);
}
.mood-pill.active{
  background:var(--ember2);
  border-color:rgba(255,94,58,0.4);
  color:var(--fire2);
  font-weight:500;
}
.mood-pill.active:hover{transform:translateY(-1px)}
.mood-glyph{font-size:13px;line-height:1}

/* ─── MAIN LAYOUT: player top, canvas bottom ─── */
#main-layout{
  position:relative;z-index:1;
  flex:1;display:flex;flex-direction:column;
  min-height:0;height:0; /* height:0 + flex:1 = % children resolve against actual flex size */
  overflow:hidden;
}

/* ─── INLINE PLAYER (top strip, full width) ─── */
#inline-player{
  display:flex;flex-direction:row;
  flex-shrink:0;
  background:var(--ink2);
  border-bottom:1px solid var(--rim);
  /* never eat more than 80% of #main-layout, leaving ≥20% for the channel list */
  max-height:80%;
  overflow:hidden;
}
#inline-video-wrap{
  position:relative;background:#000;
  flex-shrink:0;width:80%;
  aspect-ratio:16/9;
  min-height:0; /* allow shrinking inside constrained parent */
  overflow:hidden;
}
#inline-video-wrap video{
  width:100%;height:100%;display:block;object-fit:contain;
  position:absolute;inset:0;
}
#inline-placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;background:var(--ink);
}
.inline-ph-icon{font-size:32px;opacity:0.18}
.inline-ph-msg{
  font-family:'Syne',sans-serif;font-size:9px;letter-spacing:3px;
  text-transform:uppercase;color:var(--snow3);text-align:center;line-height:1.7;
}
#inline-info{
  flex:1;display:flex;flex-direction:column;
  padding:16px 18px;gap:11px;overflow-y:auto;min-width:0;
  min-height:0;
}
#inline-idle{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;text-align:center;padding:20px;
}
#inline-idle .idle-icon{font-size:26px;opacity:0.18}
#inline-idle .idle-txt{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--snow3);line-height:1.7}

/* ─── CANVAS (below player) ─── */
#canvas{
  position:relative;z-index:1;
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  padding:18px 24px 28px;
  display:flex;flex-direction:column;
  gap:24px;
  /* always show at least 20% of the layout height so channels are visible */
  min-height:20%;
}
@keyframes section-in{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── SECTIONS ─── */
.section{animation:section-in 0.5s var(--ease) both}
.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:8px;
}
.section-title{
  font-family:'Syne',sans-serif;
  font-weight:700;font-size:15px;
  color:var(--snow);letter-spacing:0.3px;
}
.section-count{
  font-size:11px;color:var(--snow3);
  margin-left:8px;font-weight:400;
}

/* Channel grid */
.mini-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:4px;
}
.mini-card{
  display:flex;align-items:center;gap:7px;
  padding:6px 9px;
  border-radius:7px;
  cursor:pointer;
  background:var(--g);
  border:1px solid transparent;
  transition:background 0.15s,border-color 0.15s;
  min-width:0;
}
.mini-card:hover{
  background:var(--g2);
  border-color:var(--rim);
}
.mini-card.playing{
  background:var(--ember);
  border-color:rgba(255,94,58,0.3);
}
.mini-fallback{font-size:14px;flex-shrink:0;line-height:1}
.mini-img{display:none}
.mini-overlay{display:contents}
.mini-flag{display:none}
.mini-name{
  font-family:'DM Sans',sans-serif;
  font-weight:500;font-size:11px;line-height:1.2;
  color:var(--snow2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}
.mini-card:hover .mini-name,.mini-card.playing .mini-name{color:var(--snow)}
.mini-cat{display:none}

/* ─── WORLD BAND ─── */
#world-band{
  padding:10px 22px;
  background:rgba(8,8,12,0.5);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--rim);
  display:flex;flex-wrap:wrap;gap:6px;
  align-items:center;
  flex-shrink:0;
  position:relative;z-index:8;
}
.world-label{
  font-family:'Syne',sans-serif;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--snow3);font-weight:600;
  flex-shrink:0;
  margin-right:2px;
}
.country-chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:100px;
  background:var(--g2);border:1px solid var(--rim);
  font-size:11px;color:var(--snow2);
  cursor:pointer;transition:all 0.18s var(--ease);
  white-space:nowrap;
}
.country-chip:hover{
  background:var(--g3);border-color:var(--rim2);
  color:var(--snow);transform:translateY(-2px);
}
.country-chip.active{
  background:var(--ember2);
  border-color:rgba(255,94,58,0.4);
  color:var(--fire2);
}
.country-chip .chip-flag{font-size:13px}
.chip-clear{
  font-size:10px;margin-left:2px;opacity:0.7;
  font-style:normal;
}

/* ─── PLAYER SHARED STYLES ─── */
.pch-head{display:flex;align-items:center;gap:12px}
.pch-logo{
  width:42px;height:42px;border-radius:10px;
  background:var(--g2);border:1px solid var(--rim);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.pch-logo img{width:100%;height:100%;object-fit:contain}
.pch-logo-txt{font-size:18px}
.pch-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;line-height:1.1}
.pch-origin{font-size:11px;color:var(--snow3);margin-top:3px;display:flex;align-items:center;gap:4px}
.p-divider{height:1px;background:var(--rim);flex-shrink:0}
.p-section-label{
  font-family:'Syne',sans-serif;
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--snow3);font-weight:600;
}
.stream-it{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:10px;cursor:pointer;
  border:1px solid transparent;
  transition:background 0.15s,border-color 0.15s;
}
.stream-it:hover{background:var(--g2);border-color:var(--rim)}
.stream-it.active{background:var(--ember);border-color:rgba(255,94,58,0.3)}
.stream-play-btn{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:var(--g2);border:1px solid var(--rim);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;
}
.stream-it.active .stream-play-btn{background:var(--fire);border-color:transparent}
.play-icon{
  width:0;height:0;border-style:solid;
  border-width:4px 0 4px 8px;
  border-color:transparent transparent transparent var(--snow2);
  margin-left:2px;
}
.stream-it.active .play-icon{border-left-color:white}
.stream-domain{
  flex:1;font-size:11px;color:var(--snow2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.stream-it.active .stream-domain{color:var(--fire3)}
.stream-st{
  font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:2px 7px;border-radius:5px;flex-shrink:0;font-weight:500;
}
.stream-st.online{background:rgba(34,197,94,0.14);color:#4ade80}
.stream-st.error,.stream-st.timeout{background:rgba(239,68,68,0.12);color:#f87171}
.stream-st.unknown{background:var(--g2);color:var(--snow3)}
.vid-spinner{
  width:28px;height:28px;
  border:2px solid var(--rim2);border-top-color:var(--fire);
  border-radius:50%;animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── STATES ─── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;gap:12px;text-align:center;
  grid-column:1/-1;
}
.empty h3{font-family:'Syne',sans-serif;font-size:18px;color:var(--snow2)}
.empty p{font-size:13px;color:var(--snow3)}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--ink3);
  border:1px solid var(--rim2);
  padding:10px 20px;border-radius:100px;
  font-size:12px;color:var(--snow);
  letter-spacing:0.3px;
  opacity:0;
  transition:all 0.3s var(--ease);
  z-index:9000;pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── NO STREAM ─── */
.no-stream{
  padding:16px 0;font-size:12px;
  color:var(--snow3);line-height:1.7;
}
.no-stream a{color:var(--fire3);text-decoration:none}
.no-stream a:hover{text-decoration:underline}

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media(max-width:680px){
  #header{padding:12px 16px}
  #search-wrap{display:none}
  #mood-bar{padding:10px 16px}
  #canvas{padding:12px 14px 24px;gap:18px}
  .mini-row{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  #inline-player{flex-direction:column;height:auto;max-height:none}
  #inline-video-wrap{width:100%;height:auto;aspect-ratio:16/9}
  #inline-info{max-height:180px}
  #world-band{padding:8px 16px;}
}

@media(max-width:480px){
  .live-badge{display:none}
}

  TD:'🇹🇩',TF:'🇹🇫',TG:'🇹🇬',TH:'🇹🇭',TJ:'🇹🇯',TK:'🇹🇰',TL:'🇹🇱',TM:'🇹🇲',TN:'🇹🇳',TO:'🇹🇴',
  TR:'🇹🇷',TT:'🇹🇹',TV:'🇹🇻',TZ:'🇹🇿',UA:'🇺🇦',UG:'🇺🇬',US:'🇺🇸',UY:'🇺🇾',UZ:'🇺🇿',VA:'🇻🇦',

const CNAMES = {
  AR:'Argentina',US:'Estados Unidos',GB:'Reino Unido',ES:'España',MX:'México',BR:'Brasil',
  FR:'Francia',DE:'Alemania',IT:'Italia',JP:'Japón',KR:'Corea del Sur',CN:'China',

  PT:'Portugal',CO:'Colombia',PE:'Perú',CL:'Chile',VE:'Venezuela',EC:'Ecuador',
  SA:'Arabia Saudita',AE:'Emiratos Árabes',EG:'Egipto',TR:'Turquía',PK:'Pakistán',
  TH:'Tailandia',VN:'Vietnam',PH:'Filipinas',ID:'Indonesia',MY:'Malasia',
  ZA:'Sudáfrica',NG:'Nigeria',KE:'Kenia',MA:'Marruecos',UA:'Ucrania',
  RO:'Rumania',HU:'Hungría',SE:'Suecia',NO:'Noruega',AT:'Austria',CH:'Suiza',
  BE:'Bélgica',GR:'Grecia',IQ:'Iraq',IR:'Irán',LB:'Líbano',SY:'Siria',
  KW:'Kuwait',QA:'Qatar',BH:'Baréin',JO:'Jordania',IL:'Israel',
  UA:'Ucrania',CZ:'Rep. Checa',SK:'Eslovaquia',HR:'Croacia',RS:'Serbia',
  DK:'Dinamarca',FI:'Finlandia',HK:'Hong Kong',TW:'Taiwán',SG:'Singapur',
  NZ:'Nueva Zelanda',CU:'Cuba',DO:'Rep. Dominicana',GT:'Guatemala',
  HN:'Honduras',SV:'El Salvador',CR:'Costa Rica',PA:'Panamá',
  BO:'Bolivia',UY:'Uruguay',PY:'Paraguay'
};

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let allCh    = [];
let filtered = [];
let mood     = 'all';
let query    = '';
let activeCountry = 'AR';
let hlsInst  = null;

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
const flag  = c => FLAGS[c] || '🌐';
const cname = c => CNAMES[c] || c || 'Desconocido';
const cats  = ch => {
  const c = ch.categories || [];
  return Array.isArray(c) ? c.map(x => typeof x === 'object' ? (x.id||x.name||'') : x) : [c];
};
const hasMood = (ch, m) => {
  if (m === 'all') return true;
  const targets = MOOD_MAP[m] || [];
  const cc = cats(ch).map(x => x.toLowerCase());
  return targets.some(t => cc.some(c => c.includes(t)));
};
const rnd = arr => {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
};
const $ = id => document.getElementById(id);

function toast(msg, dur=2600) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

async function fetchJ(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function applyFilters() {
  const q = query.toLowerCase().trim();
  filtered = allCh.filter(ch => {
    const mOk = hasMood(ch, mood);
    const cOk = !activeCountry || ch.country === activeCountry;
    const qOk = !q
      || ch.name.toLowerCase().includes(q)
      || (ch.country||'').toLowerCase().includes(q)
      || cname(ch.country).toLowerCase().includes(q)
      || cats(ch).some(c => c.toLowerCase().includes(q));
    return mOk && cOk && qOk;
  });
  render();
}

function render() {
  const secs  = $('sections');
  const world = $('world-band');
  secs.innerHTML = '';

  if (!filtered.length) {
    secs.innerHTML = `<div class="empty"><h3>Sin resultados</h3><p>Intentá con otra búsqueda o categoría</p></div>`;
    world.style.display = 'none';
    return;
  }

  // World band — always built from allCh filtered by mood+query only,
  // never from `filtered` (which has country applied), so chips always
  // show every country available for the current mood/search.
  const q = query.toLowerCase().trim();
  const worldBase = allCh.filter(ch => {
    const mOk = hasMood(ch, mood);
    const qOk = !q
      || ch.name.toLowerCase().includes(q)
      || (ch.country||'').toLowerCase().includes(q)
      || cname(ch.country).toLowerCase().includes(q)
      || cats(ch).some(c => c.toLowerCase().includes(q));
    return mOk && qOk;
  });
  const countries = [...new Set(worldBase.map(c => c.country).filter(Boolean))];

  // Priority groups: 1=Argentina, 2=Spanish-speaking, 3=Brazil, 4=English-speaking, 5=rest
  const SPANISH = new Set(['ES','MX','CO','CL','PE','VE','EC','BO','UY','PY','CR','GT','HN','SV','NI','PA','CU','DO','PR','GQ']);
  const ENGLISH = new Set(['US','CA','AU','NZ','IE','JM','TT','BB','GH','ZA','NG','KE','SG','PH']);
  const countryPriority = code => {
    if (code === 'AR') return 1;
    if (SPANISH.has(code)) return 2;
    if (code === 'BR') return 3;
    if (ENGLISH.has(code)) return 4;
    return 5;
  };
  const topCountries = countries
    .map(c => ({code:c, count: worldBase.filter(x=>x.country===c).length}))
    .sort((a,b) => {
      const pa = countryPriority(a.code), pb = countryPriority(b.code);
      if (pa !== pb) return pa - pb;
      return b.count - a.count; // within same group, sort by channel count
    })
    .slice(0, 24);

  if (topCountries.length > 3) {
    world.style.display = 'flex';
    const existing = world.querySelectorAll('.country-chip');
    existing.forEach(e => e.remove());
    topCountries.forEach(({code}) => {
      const chip = document.createElement('button');
      const isActive = activeCountry === code;
      chip.className = 'country-chip' + (isActive ? ' active' : '');
      chip.dataset.code = code;
      chip.innerHTML = `<span class="chip-flag">${flag(code)}</span>${cname(code)}${isActive ? '<em class="chip-clear">✕</em>' : ''}`;
      chip.addEventListener('click', () => {
        activeCountry = (activeCountry === code) ? '' : code;
        applyFilters();
      });
      world.appendChild(chip);
    });
  } else {
    world.style.display = 'none';
  }

  // Sections
  const moodSections = mood === 'all'
    ? [
        ['Noticias del mundo', 'news'],
        ['Deportes en vivo',   'sports'],
        ['Entretenimiento',    'entertainment'],
        ['Música',             'music'],
        ['Cine & Series',      'movies'],
        ['Documentales',       'documentary'],
        ['Para los más chicos','kids'],
        ['Cocina & Gastronomía','cooking'],
        ['Viajes',             'travel'],
      ]
    : [[mood.charAt(0).toUpperCase()+mood.slice(1), mood]];

  let rendered = 0;
  moodSections.forEach(([label, m], idx) => {
    let batch;
    if (mood === 'all') {
      batch = filtered.filter(ch => hasMood(ch, m));
    } else {
      batch = filtered;
    }
    batch = rnd(batch).slice(0, 16);
    if (batch.length < 3) return;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.style.animationDelay = `${idx * 0.06}s`;

    const cnt = mood === 'all'
      ? filtered.filter(ch => hasMood(ch, m)).length
      : filtered.length;

    sec.innerHTML = `
      <div class="section-head">
        <div class="section-title">${label}<span class="section-count">${cnt.toLocaleString('es')}</span></div>
      </div>
      <div class="mini-row" id="mini-row-${idx}"></div>
    `;
    secs.appendChild(sec);

    const row = sec.querySelector(`#mini-row-${idx}`);
    batch.forEach(ch => row.appendChild(makeMini(ch)));
    rendered++;
    if (rendered >= (mood==='all' ? 5 : 1)) return;
  });

  // Fallback: show all as single section
  if (rendered === 0) {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-head"><div class="section-title">Canales<span class="section-count">${filtered.length.toLocaleString('es')}</span></div></div><div class="mini-row" id="fallback-row"></div>`;
    secs.appendChild(sec);
    const row = sec.querySelector('#fallback-row');
    rnd(filtered).slice(0,20).forEach(ch => row.appendChild(makeMini(ch)));
  }
}



function makeMini(ch) {
  const el = document.createElement('div');
  el.className = 'mini-card';
  el.dataset.chid = ch.id;
  const catLabel = (cats(ch)[0] || 'TV');
  el.innerHTML = `
    <div class="mini-fallback">${flag(ch.country)}</div>
    <div class="mini-name">${esc(ch.name)}</div>
    <div class="mini-cat">${esc(catLabel)}</div>
  `;
  el.addEventListener('click', () => {
    document.querySelectorAll('.mini-card').forEach(c => c.classList.remove('playing'));
    el.classList.add('playing');
    openPlayer(ch.id);
  });
  return el;
}

function esc(str) {
  return String(str||'').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ════════════════════════════════════════
   PLAYER
════════════════════════════════════════ */
async function openPlayer(id) {
  const ch = allCh.find(c => c.id === id);
  if (!ch) return;

  // Reset UI
  $('pch-name').textContent = ch.name;
  $('pch-origin').innerHTML = `<span>${flag(ch.country)}</span>${cname(ch.country)}`;

  const logoWrap = $('pch-logo-wrap');
  const logoTxt  = $('pch-logo-txt');
  logoTxt.style.display = 'flex';
  logoTxt.textContent = flag(ch.country);

  if (ch.logo) {
    const img = new Image();
    img.onload = () => {
      logoWrap.innerHTML = `<img src="${ch.logo}" alt="${esc(ch.name)}" style="width:100%;height:100%;object-fit:contain">`;
    };
    img.src = ch.logo;
  }

  $('stream-list').innerHTML = `<div class="no-stream">Buscando señal…</div>`;
  $('inline-idle').style.display = 'none';
  $('inline-active').style.display = 'flex';
  resetVideo();

  // dlhd channels already carry their streams — no API call needed
  if (ch._dlhd && ch.streams && ch.streams.length) {
    renderStreams(ch.streams, ch);
    return;
  }

  try {
    let detail;
    try {
      const all = await fetchJ(`${RAW}/channels.json`);
      detail = all.find(c => c.id === id);
    } catch(_) {}

    if (!detail || !(detail.streams || []).length) {
      const streams = await fetchJ(`${API}/streams.json`);
      const chStr = streams.filter(s => s.channel === id && !s.is_nsfw);
      detail = {...ch, streams: chStr.map(s => ({
        url: s.url,
        status: s.status || 'unknown',
        http_referrer: s.http_referrer,
        user_agent: s.user_agent
      }))};
    }

    renderStreams(detail.streams || [], ch);
  } catch(e) {
    $('stream-list').innerHTML = `<div class="no-stream">No se pudo cargar la señal.</div>`;
  }
}

function renderStreams(streams, ch) {
  const el = $('stream-list');
  if (!streams.length) {
    el.innerHTML = `<div class="no-stream">
      Sin fuentes disponibles.
      ${ch && ch.website ? `<br><a href="${ch.website}" target="_blank" rel="noopener">Visitar sitio oficial →</a>` : ''}
    </div>`;
    return;
  }

  el.innerHTML = '';
  streams.forEach((s, i) => {
    const it = document.createElement('div');
    it.className = 'stream-it';
    it.dataset.idx = i;
    let domain = s.label || '';
    if (!domain) {
      try { domain = new URL(s.url).hostname.replace('www.',''); } catch(_) { domain = s.url.slice(0,40); }
    }
    const st = s.status || 'unknown';
    it.innerHTML = `
      <div class="stream-play-btn"><div class="play-icon"></div></div>
      <div class="stream-domain">${esc(domain)}</div>
      <div class="stream-st ${st}">${st}</div>
    `;
    it.addEventListener('click', () => {
      document.querySelectorAll('.stream-it').forEach(x => x.classList.remove('active'));
      it.classList.add('active');
      playStream(s);
    });
    el.appendChild(it);
  });

  // Auto-play first
  el.querySelector('.stream-it')?.click();
}

function playStream(s) {
  resetVideo();
  const vid = $('vid-el');
  const iframeEl = $('iframe-el');
  const ph  = $('inline-placeholder');

  ph.style.display = 'flex';
  vid.style.display = 'none';
  iframeEl.style.display = 'none';

  // iframe mode: url contains dlhd.pk or is not an m3u8
  if (s.iframe || (!s.url.match(/\.m3u8/i) && s.url.match(/\.php|embed|player/i))) {
    const src = s.iframe || s.url;
    iframeEl.src = src;
    iframeEl.style.display = 'block';
    ph.style.display = 'none';
    return;
  }

  const show = () => {
    ph.style.display = 'none';
    vid.style.display = 'block';
  };

  if (Hls.isSupported() && s.url.match(/\.m3u8/i)) {
    hlsInst = new Hls({
      xhrSetup(xhr) {
        if (s.http_referrer) xhr.setRequestHeader('Referer', s.http_referrer);
      }
    });
    hlsInst.loadSource(s.url);
    hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
      show();
      vid.play().catch(()=>{});
    });
    hlsInst.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal) toast('Señal no disponible. Probá otra fuente.');
    });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = s.url;
    show();
    vid.play().catch(()=>{});
  } else {
    vid.src = s.url;
    show();
    vid.play().catch(()=>{});
  }
}

function resetVideo() {
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
  const vid = $('vid-el');
  vid.pause();
  vid.src = '';
  vid.style.display = 'none';
  const iframeEl = $('iframe-el');
  if (iframeEl) { iframeEl.src = ''; iframeEl.style.display = 'none'; }
  $('inline-placeholder').style.display = 'flex';
}

/* ── Mood bar scroll arrows + drag-to-scroll ── */
(function() {
  const bar  = $('mood-bar');
  const prev = $('mood-prev');
  const next = $('mood-next');

  function updateArrows() {
    const atStart = bar.scrollLeft <= 4;
    const atEnd   = bar.scrollLeft >= bar.scrollWidth - bar.clientWidth - 4;
    prev.classList.toggle('hidden', atStart);
    next.classList.toggle('hidden', atEnd);
  }

  prev.addEventListener('click', () => bar.scrollBy({left:-180, behavior:'smooth'}));
  next.addEventListener('click', () => bar.scrollBy({left: 180, behavior:'smooth'}));

  bar.addEventListener('scroll', updateArrows, {passive:true});
  setTimeout(updateArrows, 100);
  window.addEventListener('resize', updateArrows);

  /* Drag-to-scroll */
  let dragging = false, startX = 0, startScroll = 0, moved = false;

  bar.addEventListener('mousedown', e => {
    dragging  = true;
    moved     = false;
    startX    = e.pageX;
    startScroll = bar.scrollLeft;
    bar.style.cursor = 'grabbing';
    bar.style.userSelect = 'none';
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 4) moved = true;
    bar.scrollLeft = startScroll - dx;
  });

  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    bar.style.cursor = '';
    bar.style.userSelect = '';
  });

  /* Prevent click firing on pills after a drag */
  bar.addEventListener('click', e => {
    if (moved) { e.stopPropagation(); moved = false; }
  }, true);
})();

function buildDlhdChannels() {
  const dlhdCh = [];
  CH_CATEGORIES.forEach(cat => {
    const meta = DLHD_CAT_META[cat.id] || { categories:['general'], country:'US' };
    cat.channels.forEach(ch => {
      const streams = DLHD_OVERRIDES[ch.id] || CH_SOURCES.map((src, i) => ({
            url: `${DLHD_BASE}/${src}/stream-${ch.id}.php`,
            iframe: `${DLHD_BASE}/${src}/stream-${ch.id}.php`,
            status: 'online',
            label: CH_SRC_LABELS[i],
          }));
      dlhdCh.push({
        id: `dlhd-${ch.id}`,
        name: ch.name,
        country: meta.country,
        categories: meta.categories,
        streams,
        _dlhd: true,
      });
    });
  });
  return dlhdCh;
}

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
async function boot() {
  // Load dlhd channels immediately so the app shows something fast
  const dlhdChannels = buildDlhdChannels();

  try {
    const [channels, streams] = await Promise.all([
      fetchJ(`${RAW}/channels.json`),
      fetchJ(`${API}/streams.json`)
    ]);

    // Solo mostrar canales que tienen al menos una fuente disponible
    const withStreams = new Set(
      streams.filter(s => !s.is_nsfw && s.url).map(s => s.channel)
    );

    const iptvCh = channels.filter(ch => ch.name && !ch.is_nsfw && withStreams.has(ch.id));

    // Merge: iptv-org first, then dlhd (skip any dlhd that duplicates an iptv name)
    const iptvNames = new Set(iptvCh.map(c => c.name.toLowerCase().trim()));
    const uniqueDlhd = dlhdChannels.filter(c => !iptvNames.has(c.name.toLowerCase().trim()));

    allCh = [...iptvCh, ...uniqueDlhd];
    applyFilters();

  } catch(e) {
    // iptv-org failed — show dlhd channels only
    allCh = dlhdChannels;
    applyFilters();
  }

  // Auto-play default channel: DAZN F1 ES
  const defaultCh = allCh.find(c => c.id === 'dlhd-537');
  if (defaultCh) {
    openPlayer(defaultCh.id);
  } else {
    // Fallback: open directly via iframe
    $('inline-idle').style.display = 'none';
    $('inline-active').style.display = 'flex';
    $('pch-name').textContent = 'DAZN F1 ES';
    $('pch-origin').innerHTML = '<span>🇪🇸</span>España';
    $('pch-logo-txt').textContent = '🏎';
    resetVideo();
    const iframeEl = $('iframe-el');
    iframeEl.src = 'https://dlhd.pk/player/stream-537.php';
    iframeEl.style.display = 'block';
    $('inline-placeholder').style.display = 'none';
    $('stream-list').innerHTML = '<div class="stream-it active" style="pointer-events:none"><div class="stream-play-btn"><div class="play-icon"></div></div><div class="stream-domain">DAZN F1 ES</div><div class="stream-st online">online</div></div>';
  }

  // Fade intro → reveal app
  setTimeout(() => {
    $('intro').classList.add('exit');
    $('app').classList.add('visible');
    setTimeout(() => { $('intro').style.display = 'none'; }, 800);
  }, 3200);
}
